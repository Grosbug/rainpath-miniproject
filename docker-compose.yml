# Local + demo deployment for RainPath. Two services on a private network,
# only the frontend's port is exposed on the host. Backend's SQLite file lives
# on a named volume so data survives `docker compose down`.
#
# Quick start:
#   docker compose up --build           # build and run
#   open http://localhost:8080          # frontend (nginx serves SPA + /api)
#   docker compose logs -f backend      # tail backend logs (pino JSON)
#   docker compose down                 # stop (volume preserved)
#   docker compose down -v              # stop AND wipe DB volume
#
# Seeding the demo dataset (idempotent — re-running skips rows that already exist):
#   docker compose --profile seed run --rm seed

# Shared build directive so the `backend` and `seed` services compile + reuse the
# exact same image — anchored so changing the Dockerfile path is a one-liner.
x-backend-build: &backend-build
  context: .
  dockerfile: backend/Dockerfile

services:
  backend:
    # Explicit `image:` ensures the `seed` service below reuses the EXACT same
    # built image — without it, compose tags each service's build separately
    # (`<project>-<service>`) and they can drift out of sync.
    image: rainpath/backend:local
    build: *backend-build
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: file:/data/dev.db
      # Comma-separated list of allowed origins. Default matches the frontend
      # service exposed on :8080 — override for a real deploy.
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Pretty logs hurt in production aggregation pipelines; keep JSON default.
      LOG_PRETTY: ${LOG_PRETTY:-false}
    volumes:
      - rainpath_data:/data
    # No host port mapping — only the frontend's nginx reaches /api/* via the
    # internal compose network. Uncomment the next two lines if you want to
    # hit the backend directly from the host (debugging, curl).
    # ports:
    #   - "3000:3000"
    healthcheck:
      # /api/health is implemented by HealthController and exercises a SELECT 1
      # against SQLite, so this catches both process-up and DB-up failures.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Same-origin /api works because nginx reverse-proxies inside this
        # container. Override at build time for a CDN/origin-split layout.
        VITE_API_BASE_URL: /api
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # One-shot seeder. Reuses the backend image so the workspace tsx + seed.ts +
  # Prisma client are all already on disk. `profiles: [seed]` keeps it out of
  # the default `docker compose up` set — invoke explicitly with:
  #   docker compose --profile seed run --rm seed
  # The seed script (backend/prisma/seed.ts) is idempotent: existing rows are
  # left alone, so running it on a populated DB is a safe no-op.
  seed:
    image: rainpath/backend:local
    build: *backend-build
    environment:
      DATABASE_URL: file:/data/dev.db
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - rainpath_data:/data
    # Override the backend's entrypoint+CMD (which would start the API) to run
    # the seed task instead. `prisma migrate deploy` keeps the schema in sync
    # in case `seed` runs before the backend service has ever started.
    entrypoint: ["/sbin/tini", "--"]
    command:
      - sh
      - -c
      - |
        cd backend && \
        ./node_modules/.bin/prisma migrate deploy && \
        ./node_modules/.bin/tsx prisma/seed.ts
    profiles: ["seed"]

volumes:
  # Named volume so `docker compose down` doesn't wipe the DB. Use
  # `docker compose down -v` to start fully clean.
  rainpath_data:
