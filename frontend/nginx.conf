# nginx config baked into the frontend image. Serves the Vite static build
# from /usr/share/nginx/html and reverse-proxies /api/* to the `backend`
# service on the compose network (DNS lookup of "backend" comes from the
# docker-compose service name).

server {
  listen      80 default_server;
  server_name _;

  # Slightly larger than NestJS body limit so the reverse proxy never
  # rejects payloads the backend would accept.
  client_max_body_size 2m;

  # Compressed responses for the small static bundle. nginx already gzips
  # text MIME types by default; explicit list covers the JS/CSS modules.
  gzip            on;
  gzip_vary       on;
  gzip_min_length 1024;
  gzip_types      text/plain text/css text/javascript application/javascript
                  application/json application/wasm image/svg+xml;

  # API passthrough. `proxy_pass http://backend:3000/api/` (trailing slash)
  # preserves the /api prefix the NestJS server expects via setGlobalPrefix.
  location /api/ {
    proxy_pass         http://backend:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  # SPA fallback: every non-file route returns index.html so React Router can
  # take over client-side.
  location / {
    root      /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }

  # Long cache for hashed asset bundles — Vite stamps content hashes in the
  # filename so this is safe and large.
  location /assets/ {
    root      /usr/share/nginx/html;
    expires   1y;
    add_header Cache-Control "public, immutable";
  }
}
